<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FCM Contact Sheet Generator</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.2.4/docx.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: #f5f5f5;
  color: #1a1a1a;
  min-height: 100vh;
}

.app-wrap {
  display: grid;
  grid-template-columns: 420px 1fr;
  min-height: 100vh;
}

/* ─── LEFT PANEL (form) ─── */
.form-panel {
  background: #1c1c1e;
  color: #f0f0f0;
  padding: 28px 28px 40px;
  overflow-y: auto;
  position: sticky;
  top: 0;
  height: 100vh;
}

.form-panel h1 {
  font-size: 17px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 4px;
  letter-spacing: -0.2px;
}
.form-panel .subtitle {
  font-size: 12px;
  color: #888;
  margin-bottom: 24px;
}

.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: #888;
  margin: 20px 0 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid #333;
}

.field {
  margin-bottom: 10px;
}
.field label {
  display: block;
  font-size: 11px;
  color: #888;
  margin-bottom: 3px;
  font-weight: 400;
}
.field input, .field textarea {
  width: 100%;
  background: #2c2c2e;
  border: 1px solid #3a3a3c;
  border-radius: 6px;
  padding: 8px 10px;
  color: #fff;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
.field input:focus, .field textarea:focus {
  border-color: #00DE50;
}
.field input::placeholder, .field textarea::placeholder { color: #555; }
.field textarea { resize: vertical; min-height: 54px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.team-entry {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
  align-items: center;
}
.team-entry input {
  flex: 1;
  background: #2c2c2e;
  border: 1px solid #3a3a3c;
  border-radius: 6px;
  padding: 7px 10px;
  color: #fff;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  outline: none;
}
.team-entry input:focus { border-color: #00DE50; }
.rm-btn {
  background: none;
  border: none;
  color: #666;
  cursor: pointer;
  font-size: 18px;
  padding: 0 4px;
  line-height: 1;
  transition: color 0.15s;
}
.rm-btn:hover { color: #ff453a; }

.toggle-widget {
  display: flex;
  gap: 0;
  margin-bottom: 10px;
  border-radius: 7px;
  overflow: hidden;
  border: 1px solid #3a3a3c;
}
.toggle-opt {
  flex: 1;
  padding: 8px 10px;
  background: #2c2c2e;
  border: none;
  color: #888;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  border-right: 1px solid #3a3a3c;
  text-align: center;
}
.toggle-opt:last-child { border-right: none; }
.toggle-opt.active { background: #00DE50; color: #000; font-weight: 600; }
.toggle-opt:not(.active):hover { background: #3a3a3c; color: #ccc; }

.add-member-btn {
  background: none;
  border: 1px dashed #444;
  border-radius: 6px;
  color: #888;
  cursor: pointer;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 12px;
  padding: 6px 12px;
  width: 100%;
  margin-top: 2px;
  transition: all 0.15s;
}
.add-member-btn:hover { border-color: #00DE50; color: #00DE50; }

.btn-row {
  display: flex;
  gap: 8px;
  margin-top: 28px;
}
.dl-btn {
  flex: 1;
  padding: 11px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  transition: opacity 0.15s, transform 0.1s;
}
.dl-btn:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-word { background: #0060df; color: #fff; }
.btn-pdf  { background: #e4e4e4; color: #1a1a1a; }

/* ─── RIGHT PANEL (preview) ─── */
.preview-panel {
  background: #e8e8e8;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 36px 24px 60px;
  overflow-y: auto;
}
.preview-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: #999;
  margin-bottom: 20px;
  align-self: flex-start;
  padding-left: 4px;
}

/* ─── THE SHEET (preview) ─── */
.sheet {
  background: #fff;
  width: 100%;
  max-width: 720px;
  box-shadow: 0 4px 32px rgba(0,0,0,0.12);
  font-family: 'IBM Plex Sans', sans-serif;
}

.sheet-header-img {
  width: 100%;
  display: block;
}

.sheet-title-block {
  padding: 16px 24px 0;
}
.sheet-title-main {
  font-size: 22px;
  font-weight: 700;
  color: #1a1a1a;
  line-height: 1.2;
}
.sheet-title-main em {
  font-weight: 400;
  font-style: italic;
}
.sheet-title-client {
  font-weight: 700;
  font-style: italic;
}
.sheet-country {
  font-size: 17px;
  font-weight: 700;
  color: #00DE50;
  margin-top: 4px;
  margin-bottom: 14px;
}

.sheet-cols {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
  padding: 0 24px 20px;
}

.sheet-col {
  padding: 0 12px 0 0;
  font-size: 8.5px;
  line-height: 1.6;
  color: #1a1a1a;
}
.sheet-col:not(:first-child) {
  padding-left: 12px;
  border-left: 1px solid #e0e0e0;
}

.col-heading {
  font-size: 9px;
  font-weight: 700;
  color: #1a1a1a;
  margin-bottom: 6px;
}
.col-sub {
  font-size: 8px;
  color: #666;
  margin-bottom: 4px;
}
.contact-label {
  color: #888;
}
.person-name {
  font-weight: 700;
  font-size: 9px;
}
.section-gap { margin-top: 10px; }
.after-note {
  font-style: italic;
  color: #888;
  font-size: 7.5px;
}

.sheet-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 24px;
  border-top: 1px solid #eee;
}
.footer-url {
  font-size: 9px;
  font-weight: 700;
  color: #1a1a1a;
}
.footer-logo {
  height: 28px;
}

@media (max-width: 800px) {
  .app-wrap { grid-template-columns: 1fr; }
  .form-panel { position: static; height: auto; }
}
</style>
</head>
<body>

<div class="app-wrap">
  <!-- FORM -->
  <div class="form-panel">
    <h1>FCM Contact Sheet</h1>
    <div class="subtitle">Fill in the details to generate your contact sheet</div>

    <div class="section-label">Client</div>
    <div class="row2">
      <div class="field"><label>Client Name</label><input id="clientName" placeholder="Vanderlay Industries" oninput="rp()"></div>
      <div class="field"><label>Country / Region</label><input id="clientCountry" placeholder="Australia" oninput="rp()"></div>
    </div>

    <div class="section-label">FCM Office</div>
    <div class="field"><label>Address</label><textarea id="officeAddr" placeholder="Level 23, 1 Southbank Boulevard, Melbourne VIC 3004" oninput="rp()"></textarea></div>
    <div class="row2">
      <div class="field"><label>Hours</label><input id="officeHours" placeholder="Monday to Friday, 8am-6pm" oninput="rp()"></div>
      <div class="field"><label>Holidays note</label><input id="officeHols" placeholder="excluding National Public Holidays" oninput="rp()"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Phone</label><input id="officePhone" placeholder="+61 3 7033 0326" oninput="rp()"></div>
      <div class="field"><label>Email</label><input id="officeEmail" placeholder="client@fcmtravel.com.au" oninput="rp()"></div>
    </div>

    <div class="section-label">Account Manager</div>
    <div class="field"><label>Name</label><input id="amName" placeholder="Heathcote Shiraz" oninput="rp()"></div>
    <div class="row2">
      <div class="field"><label>Phone</label><input id="amPhone" placeholder="0411 999 007" oninput="rp()"></div>
      <div class="field"><label>Email</label><input id="amEmail" placeholder="heathcoe.shiraz@fcmtravel.com.au" oninput="rp()"></div>
    </div>

    <div class="section-label">Operations / Regional General Manager</div>
    <div class="toggle-widget">
      <button class="toggle-opt active" id="tog-om" onclick="setOmTitle('Operations Manager')">Operations Manager</button>
      <button class="toggle-opt" id="tog-rgm" onclick="setOmTitle('Regional General Manager')">Regional General Manager</button>
    </div>
    <div class="field"><label>Name</label><input id="omName" placeholder="Precious Bevington" oninput="rp()"></div>
    <div class="row2">
      <div class="field"><label>Phone</label><input id="omPhone" placeholder="0482 880 414" oninput="rp()"></div>
      <div class="field"><label>Email</label><input id="omEmail" placeholder="precious.bevington@fcmtravel.com.au" oninput="rp()"></div>
    </div>

    <div class="section-label">Dedicated Travel Team</div>
    <div class="field"><label>Team Leader</label><input id="tlName" placeholder="Clive 'The Chip' Crinkly" oninput="rp()"></div>
    <div class="row2">
      <div class="field"><label>Phone</label><input id="tlPhone" placeholder="0433 500 611" oninput="rp()"></div>
      <div class="field"><label>Email</label><input id="tlEmail" placeholder="clive.crinkly@fcmtravel.com.au" oninput="rp()"></div>
    </div>
    <div style="margin-top:6px;margin-bottom:4px;font-size:11px;color:#888;">Operational Team Members</div>
    <div id="teamList"></div>
    <button class="add-member-btn" onclick="addMember()">+ Add team member</button>

    <div class="section-label">After Hours</div>
    <div class="row2">
      <div class="field"><label>Phone</label><input id="ahPhone" placeholder="+61 3 7033 0326" oninput="rp()"></div>
      <div class="field"><label></label></div>
    </div>


    <div class="section-label">FCM Online Helpdesk</div>
    <div class="row2">
      <div class="field"><label>Hours</label><input id="hdHours" placeholder="Monday to Friday, 8am-6pm" oninput="rp()"></div>
      <div class="field"><label>Holidays note</label><input id="hdHols" placeholder="excluding National Public Holidays" oninput="rp()"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Phone</label><input id="hdPhone" placeholder="+61 3 7033 0326" oninput="rp()"></div>
      <div class="field"><label>Email</label><input id="hdEmail" placeholder="client@fcmtravel.com.au" oninput="rp()"></div>
    </div>

    <div class="section-label">Leisure Travel</div>
    <div class="field"><label>Phone</label><input id="ltPhone" placeholder="1300 174 589" oninput="rp()"></div>

    <div class="btn-row">
      <button class="dl-btn btn-pdf" onclick="genPDF()">🖨 Print / Save as PDF</button>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-panel">
    <div class="preview-label">Live Preview</div>
    <div class="sheet" id="sheet"></div>
  </div>
</div>

let memberCount = 0;
let omTitle = 'Operations Manager';

function setOmTitle(title) {
  omTitle = title;
  document.getElementById('tog-om').classList.toggle('active', title === 'Operations Manager');
  document.getElementById('tog-rgm').classList.toggle('active', title === 'Regional General Manager');
  rp();
}

function g(id) { return (document.getElementById(id)?.value||'').trim(); }
function getMembers() {
  return [...document.querySelectorAll('.member-input')].map(e=>e.value.trim()).filter(Boolean);
}

function addMember() {
  const id = ++memberCount;
  const div = document.createElement('div');
  div.className = 'team-entry';
  div.id = 'me-'+id;
  div.innerHTML = `<input class="member-input" placeholder="Team member name" oninput="rp()"><button class="rm-btn" onclick="rmMember(${id})">×</button>`;
  document.getElementById('teamList').appendChild(div);
  rp();
}
function rmMember(id) { document.getElementById('me-'+id)?.remove(); rp(); }

function rp() {
  const clientName = g('clientName')||'Client Name';
  const country    = g('clientCountry')||'Country';
  const addr       = g('officeAddr')||'Office Address';
  const hours      = g('officeHours')||'Monday to Friday, 8am-6pm';
  const hols       = g('officeHols')||'excluding National Public Holidays';
  const oPhone     = g('officePhone');
  const oEmail     = g('officeEmail');
  const amName     = g('amName');
  const amPhone    = g('amPhone');
  const amEmail    = g('amEmail');
  const omName     = g('omName');
  const omPhone    = g('omPhone');
  const omEmail    = g('omEmail');
  const tlName     = g('tlName');
  const tlPhone    = g('tlPhone');
  const tlEmail    = g('tlEmail');
  const members    = getMembers();
  const ahPhone    = g('ahPhone');
  const ahNote     = g('ahNote');
  const hdHours    = g('hdHours')||hours;
  const hdHols     = g('hdHols')||hols;
  const hdPhone    = g('hdPhone');
  const hdEmail    = g('hdEmail');
  const ltPhone    = g('ltPhone');

  function lbl(prefix, val) {
    if(!val) return '';
    return `<div><span class="contact-label">${prefix} </span>${val}</div>`;
  }

  const col1 = `
    <div class="col-heading">FCM office contact details and hours</div>
    <div>${addr.replace(/\n/g,'<br>')}</div>
    <div>${lbl('H:', hours + (hols ? ' ('+hols+')' : ''))}</div>
    ${lbl('T:', oPhone)}
    ${lbl('E:', oEmail)}
    ${amName ? `<div class="section-gap"><div class="col-heading">Your Account Manager</div>
      <div class="person-name">${amName}</div>
      ${lbl('T:', amPhone)}${lbl('E:', amEmail)}</div>` : ''}
    ${omName ? `<div class="section-gap"><div class="col-heading">Your ${omTitle}</div>
      <div class="person-name">${omName}</div>
      ${lbl('T:', omPhone)}${lbl('E:', omEmail)}</div>` : ''}
  `;

  const membersHtml = members.map(m=>`<div>${m}</div>`).join('');
  const col2 = `
    <div class="col-heading">Your dedicated travel team</div>
    ${tlName ? `<div><span class="col-sub">Team Leader</span><br><div class="person-name">${tlName}</div>
      ${lbl('T:', tlPhone)}${lbl('E:', tlEmail)}</div>` : ''}
    ${membersHtml ? `<div class="section-gap"><span class="col-sub">Operational Team</span><br>${membersHtml}</div>` : ''}
    ${ahPhone ? `<div class="section-gap">
      <div class="col-heading">After Hours service</div>
      <div class="col-sub">Need assistance with your travel arrangements and our office is closed?</div>
      ${lbl('T:', ahPhone)}
      <div class="after-note">Note: After hours service is for urgent bookings/changes only. Additional fees may apply.</div>
    </div>` : ''}
  `;

  const col3 = `
    <div class="col-heading">FCM Online helpdesk</div>
    <div class="col-sub">For technical assistance, please contact</div>
    ${lbl('H:', hdHours + (hdHols ? ' ('+hdHols+')' : ''))}
    ${lbl('T:', hdPhone)}
    ${lbl('E:', hdEmail)}
    ${ltPhone ? `<div class="section-gap"><div class="col-heading">Leisure Travel Services</div>${lbl('T:', ltPhone)}</div>` : ''}
  `;

  document.getElementById('sheet').innerHTML = `
    <img class="sheet-header-img" src="${HEADER_B64}" alt="FCM Header">
    <div class="sheet-title-block">
      <div class="sheet-title-main">Your FCM Contacts <em>for </em><span class="sheet-title-client">${clientName}</span></div>
      <div class="sheet-country">${country}</div>
    </div>
    <div class="sheet-cols">
      <div class="sheet-col">${col1}</div>
      <div class="sheet-col">${col2}</div>
      <div class="sheet-col">${col3}</div>
    </div>
    <div class="sheet-footer">
      <div class="footer-url">fcm.travel</div>
      <img class="footer-logo" src="${LOGO_B64}" alt="FCM Logo">
    </div>
  `;
}

// ── WORD GENERATION ──────────────────────────────
async function genWord() {
  const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
           AlignmentType, BorderStyle, WidthType, ShadingType, VerticalAlign, ImageRun } = docx;

  const clientName = g('clientName')||'Client Name';
  const country    = g('clientCountry')||'Country';
  const addr       = g('officeAddr')||'';
  const hours      = g('officeHours')||'';
  const hols       = g('officeHols')||'';
  const oPhone     = g('officePhone');
  const oEmail     = g('officeEmail');
  const amName     = g('amName');
  const amPhone    = g('amPhone');
  const amEmail    = g('amEmail');
  const omName     = g('omName');
  const omPhone    = g('omPhone');
  const omEmail    = g('omEmail');
  const tlName     = g('tlName');
  const tlPhone    = g('tlPhone');
  const tlEmail    = g('tlEmail');
  const members    = getMembers();
  const ahPhone    = g('ahPhone');
  const ahNote     = g('ahNote');
  const hdHours    = g('hdHours')||hours;
  const hdHols     = g('hdHols')||hols;
  const hdPhone    = g('hdPhone');
  const hdEmail    = g('hdEmail');
  const ltPhone    = g('ltPhone');

  const FONT = 'IBM Plex Sans';
  const noBorder = { style: BorderStyle.NONE, size: 0, color: 'FFFFFF' };
  const noBorders = { top:noBorder, bottom:noBorder, left:noBorder, right:noBorder };

  function p(children, opts={}) {
    return new Paragraph({ children, spacing:{ after:40 }, ...opts });
  }
  function heading(text) {
    return new Paragraph({ children:[new TextRun({ text, font:FONT, bold:true, size:22 })], spacing:{ before:200, after:100 } });
  }
  function subtext(text) {
    if(!text) return null;
    return new Paragraph({ children:[new TextRun({ text, font:FONT, size:16, color:'666666' })], spacing:{ after:60 } });
  }
  function contactLine(prefix, value) {
    if(!value) return null;
    return new Paragraph({ children:[
      new TextRun({ text:prefix+' ', font:FONT, size:18, color:'888888' }),
      new TextRun({ text:value, font:FONT, size:18 })
    ], spacing:{ after:40 } });
  }
  function bold(text) {
    if(!text) return null;
    return new Paragraph({ children:[new TextRun({ text, font:FONT, bold:true, size:20 })], spacing:{ after:40 } });
  }
  function small(text) {
    if(!text) return null;
    return new Paragraph({ children:[new TextRun({ text, font:FONT, size:18 })], spacing:{ after:30 } });
  }
  function italicSmall(text) {
    if(!text) return null;
    return new Paragraph({ children:[new TextRun({ text, font:FONT, size:16, italics:true, color:'888888' })], spacing:{ after:40 } });
  }
  function spacer(before=200) {
    return new Paragraph({ children:[], spacing:{ before } });
  }

  // Fetch images as arraybuffer
  async function b64ToArr(b64str) {
    const base64 = b64str.split(',')[1];
    const bin = atob(base64);
    const arr = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
    return arr.buffer;
  }

  const headerBuf = await b64ToArr(HEADER_B64);
  const logoBuf   = await b64ToArr(LOGO_B64);

  const CELL_W = 3568;

  function makeCell(children, marginLeft=0, marginRight=140) {
    return new TableCell({
      borders: noBorders,
      width: { size: CELL_W, type: WidthType.DXA },
      margins: { top:140, bottom:140, left:marginLeft, right:marginRight },
      verticalAlign: VerticalAlign.TOP,
      children: children.filter(Boolean)
    });
  }

  const col1 = [
    heading('FCM office contact details and hours'),
    ...addr.split('\n').map(a=>new Paragraph({ children:[new TextRun({ text:a, font:FONT, size:17, color:'000000' })], spacing:{ after:60 } })),
    contactLine('H:', hours+(hols?' ('+hols+')':'')),
    contactLine('T:', oPhone),
    contactLine('E:', oEmail),
    amName ? spacer() : null, amName ? heading('Your Account Manager') : null,
    bold(amName), contactLine('T:', amPhone), contactLine('E:', amEmail),
    omName ? spacer() : null, omName ? heading('Your '+omTitle) : null,
    bold(omName), contactLine('T:', omPhone), contactLine('E:', omEmail),
  ];

  const col2 = [
    heading('Your dedicated travel team'),
    tlName ? new Paragraph({ children:[new TextRun({ text:'Team Leader', font:FONT, size:17, color:'888888' })], spacing:{ after:30 } }) : null,
    bold(tlName), contactLine('T:', tlPhone), contactLine('E:', tlEmail),
    members.length ? spacer(100) : null,
    members.length ? new Paragraph({ children:[new TextRun({ text:'Operational Team', font:FONT, size:17, color:'888888' })], spacing:{ after:30 } }) : null,
    ...members.map(m=>small(m)),
    ahPhone ? spacer() : null,
    ahPhone ? heading('After Hours service') : null,
    ahPhone ? subtext('Need assistance with your travel arrangements and our office is closed?') : null,
    ahPhone ? contactLine('T:', ahPhone) : null,
    ahPhone ? italicSmall('Note: After hours service is for urgent bookings/changes only. Additional fees may apply.') : null,
  ];

  const col3 = [
    heading('FCM Online helpdesk'),
    subtext('For technical assistance, please contact'),
    contactLine('H:', hdHours+(hdHols?' ('+hdHols+')':'')),
    contactLine('T:', hdPhone),
    contactLine('E:', hdEmail),
    ltPhone ? spacer() : null,
    ltPhone ? heading('Leisure Travel Services') : null,
    ltPhone ? contactLine('T:', ltPhone) : null,
  ];

  const contentTable = new Table({
    width: { size: 10704, type: WidthType.DXA },
    columnWidths: [3568, 3568, 3568],
    borders: { top:noBorder, bottom:noBorder, left:noBorder, right:noBorder, insideH:noBorder, insideV:noBorder },
    rows: [new TableRow({ children:[
      makeCell(col1, 0, 140),
      makeCell(col2, 70, 70),
      makeCell(col3, 140, 0),
    ] })]
  });

  // Footer table
  const footerTable = new Table({
    width: { size: 10704, type: WidthType.DXA },
    columnWidths: [6423, 4281],
    borders: { top:noBorder, bottom:noBorder, left:noBorder, right:noBorder, insideH:noBorder, insideV:noBorder },
    rows: [new TableRow({ children:[
      new TableCell({
        borders: noBorders,
        width: { size:6423, type:WidthType.DXA },
        margins: { top:120, left:0, bottom:0, right:0 },
        verticalAlign: VerticalAlign.CENTER,
        children: [new Paragraph({ children:[new TextRun({ text:'fcm.travel', font:FONT, bold:true, size:20 })] })]
      }),
      new TableCell({
        borders: noBorders,
        width: { size:4281, type:WidthType.DXA },
        margins: { top:120, left:0, bottom:0, right:0 },
        verticalAlign: VerticalAlign.CENTER,
        children: [new Paragraph({
          alignment: AlignmentType.RIGHT,
          children:[new ImageRun({ data:logoBuf, transformation:{ width:100, height:52 }, type:'png' })]
        })]
      })
    ] })]
  });

  const doc = new Document({
    sections: [{
      properties: {
        page: {
          size: { width:11906, height:16838 },
          margin: { top:0, right:600, bottom:500, left:600 }
        }
      },
      children: [
        new Paragraph({
          alignment: AlignmentType.CENTER,
          spacing: { after:0 },
          children: [new ImageRun({ data:headerBuf, transformation:{ width:660, height:233 }, type:'png' })]
        }),
        new Paragraph({ spacing:{ before:300, after:80 }, children:[
          new TextRun({ text:'Your FCM Contacts ', font:FONT, bold:true, size:40 }),
          new TextRun({ text:'for ', font:FONT, italics:true, size:40 }),
          new TextRun({ text:clientName, font:FONT, bold:true, italics:true, size:40 }),
        ]}),
        new Paragraph({ spacing:{ after:300 }, children:[
          new TextRun({ text:country, font:FONT, bold:true, color:'00DE50', size:32 })
        ]}),
        contentTable,
        new Paragraph({ spacing:{ before:400 }, children:[] }),
        footerTable
      ]
    }]
  });

  const blob = await Packer.toBlob(doc);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `FCM_Contacts_${clientName.replace(/\s+/g,'_')}_${country.replace(/\s+/g,'_')}.docx`;
  a.click();
  URL.revokeObjectURL(url);
}
